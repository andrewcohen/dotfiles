# Shared jj config (tracked). Machine-specific identity (user.email) lives in
# an untracked ~/.config/jj/conf.d/10-identity.toml — see Readme.md.

[ui]
default-command = ["log", "--limit=8"]
diff-editor = ["nvim", "-c", "DiffEditor $left $right $output"]
#diff-formatter = ["difft", "--color=always", "$left", "$right"]

[merge-tools.diffconflicts]
program = "nvim"
merge-args = [
    "-c", "let g:jj_diffconflicts_marker_length=$marker_length",
    "-c", "JJDiffConflicts!", "$output", "$base", "$left", "$right",
]
merge-tool-edits-conflict-markers = true

[user]
name = "Andrew Cohen"
# email is set per-machine in conf.d/10-identity.toml (untracked)

[defaults]
log.limit = 8

[workspace]
auto-update-stale = true

[git]
private-commits = 'private()'

[aliases]
tug = ["bookmark", "move", "--from", "closest_bookmark(@)", "--to", "closest_pushable(@)"]
# Usage: jj ship-stack <revision>
"ship-stack" = "!jj squash -r 'descendants($1) - $1' && jj rebase -r $1 -d main"

[revset-aliases]
"user(x)" = "author(x) | committer(x)"
# Match by name so no email needs to live in the tracked config. Covers every
# identity whose author/committer name is "Andrew Cohen", case-insensitive.
"mine()" = 'user(glob-i:"andrew cohen")'
"immutable_heads()" = "builtin_immutable_heads() | ~mine()"
"why_immutable(r)" = "r | roots(r:: & immutable_heads())"

"closest_bookmark(to)" = "heads(::to & bookmarks())"
"closest_pushable(to)" = "heads(::to & mutable() & ~description(exact:'') & (~empty() | merges()))"
'private()' = 'description(glob-i:"private:*") | description(glob-i:"[[]PRIVATE[]]*")'
# stack(x, n) is the set of mutable commits reachable from 'x', with 'n'
# parents. 'n' is often useful to customize the display and return set for
# certain operations. 'x' can be used to target the set of 'roots' to traverse,
# e.g. @ is the current stack.
"stack()" = 'stack(@)'
"stack(x)" = 'stack(x, 2)'
"stack(x, n)" = "ancestors(reachable(x, mutable()), n)"


[templates]
# git_push_bookmark = '"andrew/" ++ stringify(truncate_end(32, description.first_line().lower())).replace(regex:"[^a-zA-Z0-9]+", "-").replace(regex:"^-+", "").replace(regex:"-+$", "") ++ "-" ++ change_id.short()'
git_push_bookmark = '"andrew/push-" ++ change_id.short()'
